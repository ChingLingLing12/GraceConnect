# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name graceconnect.au www.graceconnect.au api.graceconnect.au;

    # Redirect all requests to HTTPS
    return 301 https://$host$request_uri;
}

# Frontend server (graceconnect.au)
server {
    listen 443 ssl;
    server_name graceconnect.au www.graceconnect.au;

    ssl_certificate /etc/letsencrypt/archive/api.graceconnect.au/fullchain3.pem;
    ssl_certificate_key /etc/letsencrypt/archive/api.graceconnect.au/privkey3.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Backend server (api.graceconnect.au)
server {
    listen 443 ssl;
    server_name api.graceconnect.au;

    ssl_certificate /etc/letsencrypt/archive/api.graceconnect.au/fullchain3.pem;
    ssl_certificate_key /etc/letsencrypt/archive/api.graceconnect.au/privkey3.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve backend
    location / {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin https://www.graceconnect.au;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";
        add_header Access-Control-Allow-Credentials true;
        return 204;
    }
}
}