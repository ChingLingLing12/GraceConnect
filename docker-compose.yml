services:
  frontend:
    build: ./grace-connect-frontend
    container_name: nextjs_app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000

  backend:
    build: ./grace-connect-backend
    container_name: express_api
    restart: always
    ports:
      - "5000:5000"
  
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - frontend
      - backend